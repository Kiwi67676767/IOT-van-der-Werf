<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="flex h-screen">

  <!-- Sidebar -->
  <aside class="w-64 bg-white shadow-md p-4">
    <h2 class="text-green-700 font-bold text-lg mb-6">VAN DER WERF</h2>
    <nav class="space-y-2">
      <a class="block bg-green-600 text-white p-2 rounded">Overzicht</a>
      <a class="block p-2 hover:bg-gray-200 rounded">Velden</a>
      <a class="block p-2 hover:bg-gray-200 rounded">Werkschema's</a>
      <a class="block p-2 hover:bg-gray-200 rounded">Team</a>
    </nav>
  </aside>

  <!-- Main -->
  <div class="flex-1 flex flex-col">

    <!-- Topbar -->
    <header class="bg-white p-4 shadow flex justify-between">
      <input class="border rounded px-4 py-2 w-1/3" placeholder="Zoeken...">
      <button class="bg-green-600 text-white px-4 py-2 rounded">New Project</button>
    </header>

    <!-- Content -->
    <main class="p-6 space-y-6">

      <!-- Cards -->
      <div class="grid grid-cols-3 gap-4">
        <div class="bg-white p-4 rounded shadow">
          <p class="text-gray-500">Total Area</p>
          <h2 class="text-2xl font-bold">4,250</h2>
        </div>
        <div class="bg-white p-4 rounded shadow">
          <p class="text-gray-500">Active Crews</p>
          <h2 class="text-2xl font-bold">18</h2>
        </div>
        <div class="bg-white p-4 rounded shadow">
          <p class="text-gray-500">Tasks</p>
          <h2 class="text-2xl font-bold">34</h2>
        </div>
      </div>

      <!-- Main grid -->
      <div class="grid grid-cols-3 gap-4">

        <!-- Chart -->
        <div class="col-span-2 bg-white p-4 rounded shadow">
          <h3 class="font-semibold mb-4">Maintenance Activity</h3>
          <div class="h-48 bg-gray-100 flex items-center justify-center">
            Chart placeholder
          </div>
        </div>

        <!-- Activity -->
        <div class="bg-white p-4 rounded shadow">
          <h3 class="font-semibold mb-4">Nieuwste metingen</h3>
          <p class="text-sm text-gray-600">Veld A gemaaid</p>
        </div>

      </div>

    </main>

  </div>
</div>

</body>
</html>
