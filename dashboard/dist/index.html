<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Van der Werf | Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/light/main.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/apexcharts@3.37.1/dist/apexcharts.css" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --g:    #2e7d32;
      --gd:   #1b5e20;
      --gm:   #388e3c;
      --gl:   #4caf50;
      --gp:   #e8f5e9;
      --acc:  #66bb6a;
      --sw:   260px;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #f4f6f4; margin: 0; overflow-x: hidden; }

    /* ── LOGIN ── */
    #loading-screen {
      position: fixed; inset: 0; z-index: 10000;
      background: linear-gradient(135deg, var(--gd) 0%, var(--g) 55%, var(--gl) 100%);
      display: flex; align-items: center; justify-content: center;
    }
    #login-screen {
      position: fixed; inset: 0; z-index: 9999;
      background: linear-gradient(135deg, var(--gd) 0%, var(--g) 55%, var(--gl) 100%);
      display: none; align-items: center; justify-content: center;
    }
    .lcard {
      background: #fff; border-radius: 18px; padding: 2.5rem 2.2rem;
      width: 100%; max-width: 410px; box-shadow: 0 24px 64px rgba(0,0,0,.28);
    }
    .lcard-logo {
      width: 68px; height: 68px; background: var(--g); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem; color: #fff; font-size: 2rem;
    }
    .lcard h2 { color: var(--gd); text-align: center; font-weight: 700; margin-bottom: .2rem; }
    .lcard .sub { color: #6c757d; text-align: center; font-size: .84rem; margin-bottom: 1.6rem; }
    .lcard .form-control:focus { border-color: var(--g); box-shadow: 0 0 0 .2rem rgba(46,125,50,.2); }
    .btn-lgi {
      background: var(--g); color: #fff; border: none; width: 100%;
      padding: .75rem; border-radius: 8px; font-weight: 600; font-size: 1rem; cursor: pointer;
      transition: background .2s;
    }
    .btn-lgi:hover { background: var(--gd); }
    #login-error { color: #dc3545; font-size: .84rem; text-align: center; margin-top: .6rem; display: none; }
    .lcard-hint { color: #adb5bd; font-size: .76rem; text-align: center; margin-top: 1rem; line-height: 1.7; }

    /* ── NOTIFICATIES BELL ── */
    .notif-btn { position:relative; background:none; border:none; cursor:pointer; padding:4px 8px; color:#6c757d; }
    .notif-btn:hover { color:var(--g); }
    .notif-badge { position:absolute; top:0; right:2px; background:#dc3545; color:#fff; border-radius:50%;
      font-size:.6rem; font-weight:700; min-width:16px; height:16px; display:flex; align-items:center;
      justify-content:center; line-height:1; padding:0 3px; }
    .notif-dropdown { position:fixed; top:56px; right:1rem; width:320px; background:#fff; border-radius:14px;
      box-shadow:0 8px 32px rgba(0,0,0,.18); z-index:9999; display:none; overflow:hidden; }
    .notif-dropdown.open { display:block; }
    .notif-header { background:var(--g); color:#fff; padding:.7rem 1rem; font-weight:600; font-size:.88rem;
      display:flex; align-items:center; justify-content:space-between; }
    .notif-list { max-height:320px; overflow-y:auto; }
    .notif-item { padding:.7rem 1rem; border-bottom:1px solid #f0f0f0; font-size:.83rem; display:flex; gap:.6rem; align-items:flex-start; }
    .notif-item:last-child { border-bottom:none; }
    .notif-item .ni-icon { font-size:1.1rem; flex-shrink:0; margin-top:1px; }
    .notif-empty { padding:1.5rem 1rem; text-align:center; color:#adb5bd; font-size:.84rem; }


    /* ── SIDEBAR ── */
    #sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; width: var(--sw);
      background: linear-gradient(180deg, var(--gd) 0%, var(--g) 100%);
      z-index: 100; display: flex; flex-direction: column;
      box-shadow: 4px 0 20px rgba(0,0,0,.18); transition: transform .3s;
    }
    .sb-brand {
      padding: 1.3rem 1.2rem; border-bottom: 1px solid rgba(255,255,255,.1);
      display: flex; align-items: center; gap: .75rem;
    }
    .sb-brand-icon {
      width: 40px; height: 40px; background: rgba(255,255,255,.15); border-radius: 10px;
      display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1.1rem; flex-shrink: 0;
    }
    .sb-brand-text { color: #fff; font-weight: 700; font-size: .95rem; line-height: 1.2; }
    .sb-brand-text small { font-weight: 300; font-size: .73rem; opacity: .8; display: block; }
    .sb-nav { flex: 1; overflow-y: auto; padding: .8rem 0; }
    .sb-nav::-webkit-scrollbar { width: 3px; }
    .sb-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,.2); border-radius: 2px; }
    .sb-sec { color: rgba(255,255,255,.45); font-size: .67rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .08em; padding: .6rem 1.2rem .2rem; margin-top: .4rem; }
    .sb-link {
      display: flex; align-items: center; gap: .75rem; padding: .62rem 1.2rem;
      color: rgba(255,255,255,.8); text-decoration: none; font-size: .875rem; font-weight: 500;
      border: none; background: transparent; width: 100%; text-align: left; cursor: pointer;
      transition: background .15s, color .15s; border-left: 3px solid transparent;
    }
    .sb-link i { font-size: .95rem; width: 20px; flex-shrink: 0; }
    .sb-link:hover { background: rgba(255,255,255,.12); color: #fff; }
    .sb-link.active { background: rgba(255,255,255,.18); color: #fff; border-left-color: var(--acc); padding-left: calc(1.2rem - 3px); }
    .sb-badge { margin-left: auto; background: rgba(255,255,255,.18); color: #fff; font-size: .68rem; padding: .12rem .5rem; border-radius: 20px; font-weight: 600; }
    .sb-user {
      padding: .9rem 1.2rem; border-top: 1px solid rgba(255,255,255,.1);
      display: flex; align-items: center; gap: .75rem;
    }
    .sb-avatar {
      width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,.2);
      display: flex; align-items: center; justify-content: center; color: #fff; font-size: .82rem; font-weight: 700; flex-shrink: 0;
    }
    .sb-uinfo { flex: 1; min-width: 0; }
    .sb-uinfo .n { color: #fff; font-size: .84rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sb-uinfo .r { color: rgba(255,255,255,.55); font-size: .7rem; }
    .btn-out { color: rgba(255,255,255,.7); border: none; background: transparent; cursor: pointer; font-size: .95rem; padding: .2rem; }
    .btn-out:hover { color: #fff; }

    /* ── LAYOUT ── */
    #app { display: none; min-height: 100vh; }
    #main { margin-left: var(--sw); min-height: 100vh; display: flex; flex-direction: column; }
    #topbar {
      background: #fff; border-bottom: 1px solid #e9ecef; padding: .7rem 1.5rem;
      display: flex; align-items: center; gap: 1rem; position: sticky; top: 0; z-index: 50;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    #topbar h4 { margin: 0; font-weight: 700; color: var(--gd); flex: 1; font-size: 1.1rem; }
    .tb-bc { font-size: .78rem; color: #adb5bd; }
    .tb-bc span { color: var(--g); font-weight: 500; }
    .ca { padding: 1.4rem; flex: 1; }
    .page { display: none; }
    .page.active { display: block; }

    /* ── CARDS ── */
    .dc { background: #fff; border-radius: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.07); margin-bottom: 1.2rem; }
    .dch {
      padding: .9rem 1.2rem .7rem; border-bottom: 1px solid #f0f0f0;
      display: flex; align-items: center; gap: .6rem;
    }
    .dch h6 { margin: 0; font-weight: 700; color: #1a1a2e; font-size: .88rem; flex: 1; }
    .dcb { padding: 1.2rem; }

    /* ── STAT CARDS ── */
    .sc {
      background: #fff; border-radius: 12px; padding: 1.1rem 1.3rem;
      box-shadow: 0 2px 10px rgba(0,0,0,.07); border-left: 4px solid var(--g);
      display: flex; align-items: center; gap: 1rem;
    }
    .sc .ic { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
    .sc .lbl { font-size: .72rem; color: #6c757d; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
    .sc .val { font-size: 1.9rem; font-weight: 700; color: var(--gd); line-height: 1; margin: .2rem 0; }
    .sc .sub { font-size: .75rem; color: #adb5bd; }
    .sc.g  { border-left-color: var(--g);   } .sc.g  .ic { background: var(--gp); color: var(--g); }
    .sc.r  { border-left-color: #f44336; }    .sc.r  .ic { background: #ffebee; color: #f44336; }
    .sc.o  { border-left-color: #ff9800; }    .sc.o  .ic { background: #fff3e0; color: #ff9800; }
    .sc.b  { border-left-color: #2196f3; }    .sc.b  .ic { background: #e3f2fd; color: #2196f3; }
    .sc.pu { border-left-color: #9c27b0; }    .sc.pu .ic { background: #f3e5f5; color: #9c27b0; }

    /* ── BADGES ── */
    .bs { font-size: .71rem; font-weight: 600; padding: .28em .7em; border-radius: 20px; white-space: nowrap; }
    .bsh  { background: #ffebee; color: #c62828; }
    .bsl  { background: #fff3e0; color: #e65100; }
    .bsok { background: #e8f5e9; color: #2e7d32; }
    .bsb  { background: #e3f2fd; color: #1565c0; }
    .bsgm { background: #f3e5f5; color: #6a1b9a; }

    /* ── PROGRESS ── */
    .pg { margin-bottom: .9rem; }
    .pg .pl { display: flex; justify-content: space-between; font-size: .81rem; margin-bottom: .3rem; color: #495057; font-weight: 500; }
    .progress { height: 7px; border-radius: 4px; background: #f0f0f0; }

    /* ── MAP ── */
    #arcgis-map { height: 420px; border-radius: 0 0 12px 12px; overflow: hidden; }

    /* ── ROUTE CARD ── */
    .route-item {
      display: flex; align-items: flex-start; gap: 1rem; padding: .9rem 0;
      border-bottom: 1px solid #f5f5f5;
    }
    .route-item:last-child { border-bottom: none; }
    .route-num {
      width: 32px; height: 32px; border-radius: 50%; background: var(--g); color: #fff;
      display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .85rem; flex-shrink: 0;
    }
    .route-num.urgent { background: #f44336; }
    .route-num.medium { background: #ff9800; }
    .route-num.done   { background: #9e9e9e; }
    .route-info { flex: 1; }
    .route-name { font-weight: 600; font-size: .88rem; color: #1a1a2e; }
    .route-sub  { font-size: .78rem; color: #6c757d; margin-top: .15rem; }
    .route-hoogte { font-size: 1.1rem; font-weight: 700; }

    /* ── SENSOR BUTTON ── */
    .btn-meting {
      background: linear-gradient(135deg, var(--g), var(--gl));
      color: #fff; border: none; border-radius: 12px;
      padding: 1rem 2rem; font-size: 1.05rem; font-weight: 700;
      cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: .75rem;
      box-shadow: 0 4px 14px rgba(46,125,50,.35); transition: transform .15s, box-shadow .15s;
    }
    .btn-meting:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(46,125,50,.45); }
    .btn-meting.active-meting { background: linear-gradient(135deg, #f44336, #ef5350); box-shadow: 0 4px 14px rgba(244,67,54,.35); }
    .pulse { animation: pulse 1.4s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── SENSOR STATUS ── */
    .sensor-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .sensor-dot.on  { background: var(--gl); animation: pulse 1s infinite; }
    .sensor-dot.off { background: #ccc; }

    /* ── CONTRACT ── */
    .contract-meter {
      border-radius: 12px; padding: 1rem 1.2rem; margin-bottom: .8rem;
      border: 2px solid #e9ecef;
    }
    .contract-meter.compliant   { border-color: var(--gl); background: #f9fef9; }
    .contract-meter.warning     { border-color: #ff9800;   background: #fffdf5; }
    .contract-meter.violation   { border-color: #f44336;   background: #fff9f9; }

    /* ── FIELD LIST ── */
    .fi { display: flex; align-items: center; gap: .75rem; padding: .7rem 0; border-bottom: 1px solid #f5f5f5; }
    .fi:last-child { border-bottom: none; }
    .fi-ic { width: 36px; height: 36px; border-radius: 9px; background: var(--gp); color: var(--g); display: flex; align-items: center; justify-content: center; font-size: .95rem; flex-shrink: 0; }
    .fi-info { flex: 1; min-width: 0; }
    .fi-name { font-weight: 600; font-size: .86rem; color: #1a1a2e; }
    .fi-sub  { font-size: .74rem; color: #adb5bd; }

    /* ── LEGEND ── */
    .ld { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 4px; }

    /* ── TABLE ── */
    th { font-size: .78rem !important; font-weight: 600 !important; }
    td { font-size: .84rem; vertical-align: middle !important; }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      #sidebar { transform: translateX(-100%); }
      #sidebar.open { transform: translateX(0); }
      #main { margin-left: 0; }
      .mob-show { display: flex !important; }
    }
    .mob-show { display: none; }

    footer { padding: .7rem 1.5rem; border-top: 1px solid #e9ecef; background: #fff; font-size: .76rem; color: #adb5bd; }

    /* ── IMPORT ── */
    .import-status-ok      { background:#e8f5e9; border:1px solid #a5d6a7; color:#1b5e20; }
    .import-status-err     { background:#ffebee; border:1px solid #ef9a9a; color:#b71c1c; }
    .import-status-loading { background:#e3f2fd; border:1px solid #90caf9; color:#0d47a1; }
    .spin { animation: spin .8s linear infinite; display:inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .import-row-exists td { background:#f9fef9 !important; }

    /* ── SETTINGS FIX ── */
    .settings-group { background: #f8f9fa; border-radius: 10px; padding: 1.2rem; margin-bottom: 1rem; }
    .settings-group label { font-size: .83rem; font-weight: 600; color: #495057; display: block; margin-bottom: .4rem; }
    .settings-group input.form-control { max-width: 160px; }
    .settings-row { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .settings-unit { font-size: .82rem; color: #6c757d; }
  </style>
</head>
<body>


<!-- ═══════════ LOADING ═══════════ -->
<div id="loading-screen">
  <div style="text-align:center;color:#fff">
    <div class="spinner-border mb-3" style="width:2.2rem;height:2.2rem;border-width:3px" role="status"></div>
    <div style="font-weight:600;font-size:.95rem;opacity:.9">Laden…</div>
  </div>
</div>

<!-- ═══════════ LOGIN ═══════════ -->
<div id="login-screen" style="display:none">
  <div class="lcard">
    <div class="lcard-logo"><img src="https://groenwerf.nl/wp-content/uploads/2023/10/cropped-favicon-32x32.png" alt="GroenWerf" style="width:40px;height:40px;object-fit:contain;border-radius:4px"></div>
    <h2>Van der Werf</h2>
    <p class="sub">Groenvoorzieningen &mdash; Dashboard</p>
    <form onsubmit="doLogin(event)">
      <div class="mb-3">
        <label class="form-label fw-semibold" style="font-size:.83rem">Gebruikersnaam</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input id="u" type="text" class="form-control" placeholder="bijv. machinist1" />
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold" style="font-size:.83rem">Wachtwoord</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input id="p" type="password" class="form-control" placeholder="&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;" />
          <button class="btn btn-outline-secondary" type="button" onclick="togglePass()"><i class="bi bi-eye" id="eye-ic"></i></button>
        </div>
      </div>
      <button class="btn-lgi" type="submit">Inloggen</button>
      <div id="login-error" style="color:#dc3545;font-size:.84rem;text-align:center;margin-top:.6rem;display:none"></div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script>
function togglePass() {
  const i=document.getElementById('p'), e=document.getElementById('eye-ic');
  i.type = i.type==='password'?'text':'password';
  e.className = 'bi bi-eye'+(i.type==='text'?'-slash':'');
}
function doLogin(ev) {
  ev.preventDefault();
  const u=document.getElementById('u').value.trim().toLowerCase(), p=document.getElementById('p').value;
  const err=document.getElementById('login-error');
  err.style.display='none';
  fetch('/api/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u,password:p})})
    .then(r => r.json().then(data => ({ok:r.ok, data})))
    .then(({ok,data}) => {
      if (ok) { window.location.href = '/dashboard'; }
      else { err.style.display='block'; err.textContent = data.error || 'Verkeerde gebruikersnaam of wachtwoord'; }
    })
    .catch(() => { err.style.display='block'; err.textContent='Verbindingsfout, probeer opnieuw.'; });
}
// Al ingelogd? Stuur door.
fetch('/api/me', {cache:'no-store',credentials:'same-origin'})
  .then(r => {
    document.getElementById('loading-screen').style.display='none';
    if (r.ok) window.location.href='/dashboard';
    else document.getElementById('login-screen').style.display='flex';
  })
  .catch(() => {
    document.getElementById('loading-screen').style.display='none';
    document.getElementById('login-screen').style.display='flex';
  });
</script>
</body>
</html>
